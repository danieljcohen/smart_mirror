[project]
name = "smart-mirror-backend"
version = "0.1.0"
description = "Smart mirror backend"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "flask>=3.0",
    "face-recognition>=1.3.0",
    "opencv-python-headless>=4.8",
    "numpy>=1.24",
    # face_recognition_models imports pkg_resources; setuptools 82+ drops pkg_resources
    "setuptools>=69,<81",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["app.py", "register_face.py"]
